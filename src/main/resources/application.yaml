spring:
  application:
    name: mcp-demo

  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true

  ai:
    mcp:
      server:
        name: employee-mcp-server
        version: 1.0.0
        type: SYNC

server:
  port: 8080